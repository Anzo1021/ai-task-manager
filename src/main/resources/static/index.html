<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Task Manager</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container { max-width: 680px; margin: 0 auto; }

        .header { margin-bottom: 2rem; }
        .header h1 { font-size: 28px; font-weight: 600; color: #1a1a2e; }
        .header p { font-size: 15px; color: #666; margin-top: 6px; }

        .input-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e5e5e5;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .input-row { display: flex; gap: 10px; }

        .input-row input {
            flex: 1;
            height: 44px;
            font-size: 15px;
            padding: 0 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-row input:focus { border-color: #1565C0; }

        .input-row button {
            height: 44px;
            padding: 0 20px;
            font-size: 15px;
            font-weight: 500;
            background: #1565C0;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .input-row button:hover { background: #0d47a1; }
        .input-row button:disabled { background: #90caf9; cursor: not-allowed; }

        .tasks-label {
            font-size: 13px;
            color: #888;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 1rem;
            color: #1565C0;
            font-size: 14px;
            display: none;
            background: #e3f0ff;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .task-card {
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 1rem 1.25rem;
            margin-bottom: 10px;
            animation: fadeIn 0.3s ease;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .task-card.deleting {
            opacity: 0;
            transform: translateX(20px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .task-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            gap: 8px;
        }

        .task-title-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }

        .task-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a2e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }

        .badge-HIGH    { background: #FCEBEB; color: #A32D2D; }
        .badge-MEDIUM  { background: #FAEEDA; color: #854F0B; }
        .badge-LOW     { background: #EAF3DE; color: #3B6D11; }

        .task-summary {
            font-size: 13px;
            color: #555;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .task-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .task-meta { display: flex; gap: 8px; flex-wrap: wrap; }

        .tag {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            background: #f0f0f0;
            color: #555;
            font-weight: 500;
        }

        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #ccc;
            font-size: 16px;
            padding: 4px 6px;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
            line-height: 1;
        }

        .delete-btn:hover {
            color: #A32D2D;
            background: #FCEBEB;
        }

        .empty {
            text-align: center;
            padding: 3rem;
            color: #aaa;
            font-size: 15px;
        }

        .error-msg {
            background: #FCEBEB;
            color: #A32D2D;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>AI Task Manager</h1>
        <p>Type a task — AI will analyze priority and category automatically</p>
    </div>

    <div class="input-card">
        <div class="input-row">
            <input type="text" id="taskInput"
                   placeholder="e.g. Submit assignment to professor..."
                   onkeydown="if(event.key==='Enter') addTask()" />
            <button id="addBtn" onclick="addTask()">+ Add Task</button>
        </div>
    </div>

    <div id="errorMsg" class="error-msg"></div>
    <div id="loading" class="loading">AI is analyzing your task...</div>
    <div id="tasksLabel" class="tasks-label"></div>
    <div id="taskList"><div class="empty">No tasks yet. Add one above!</div></div>

</div>

<script>
    const API = 'http://localhost:8080/api/tasks';

    window.onload = fetchTasks;

    async function fetchTasks() {
        try {
            const res = await fetch(API);
            const tasks = await res.json();
            renderTasks(tasks);
        } catch (e) {
            showError('Cannot connect to backend. Make sure Spring Boot is running on port 8080.');
        }
    }

    async function addTask() {
        const input = document.getElementById('taskInput');
        const btn   = document.getElementById('addBtn');
        const title = input.value.trim();

        if (!title) return;

        btn.disabled = true;
        btn.textContent = 'Analyzing...';
        document.getElementById('loading').style.display = 'block';
        document.getElementById('errorMsg').style.display = 'none';

        try {
            const res = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ taskTitle: title })
            });

            if (!res.ok) throw new Error('Server error: ' + res.status);

            input.value = '';
            fetchTasks();

        } catch (e) {
            showError('Failed to add task. Make sure Spring Boot is running.');
        } finally {
            btn.disabled = false;
            btn.textContent = '+ Add Task';
            document.getElementById('loading').style.display = 'none';
        }
    }

    async function deleteTask(id, cardEl) {
        cardEl.classList.add('deleting');
        try {
            const res = await fetch(API + '/' + id, { method: 'DELETE' });
            if (!res.ok) throw new Error('Delete failed');
            setTimeout(() => fetchTasks(), 300);
        } catch (e) {
            cardEl.classList.remove('deleting');
            showError('Failed to delete task. Try again.');
        }
    }

    function renderTasks(tasks) {
        const list  = document.getElementById('taskList');
        const label = document.getElementById('tasksLabel');

        if (!tasks || tasks.length === 0) {
            list.innerHTML = '<div class="empty">No tasks yet. Add one above!</div>';
            label.textContent = '';
            return;
        }

        tasks.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        label.textContent = tasks.length + ' task' + (tasks.length !== 1 ? 's' : '');

        list.innerHTML = tasks.map(task => `
            <div class="task-card" id="card-${task.id}">
                <div class="task-top">
                    <div class="task-title-row">
                        <span class="task-title">${escapeHtml(task.taskTitle)}</span>
                        <span class="badge badge-${task.priority || 'MEDIUM'}">${task.priority || 'MEDIUM'}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${task.id}, document.getElementById('card-${task.id}'))" title="Delete task">✕</button>
                </div>
                <div class="task-summary">${escapeHtml(task.aiSummary || 'No summary available')}</div>
                <div class="task-bottom">
                    <div class="task-meta">
                        <span class="tag">${escapeHtml(task.category || 'General')}</span>
                        <span class="tag">${formatTime(task.createdAt)}</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function formatTime(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
    }
</script>
</body>
</html>
